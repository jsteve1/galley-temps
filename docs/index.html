<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galley Temps</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0d1117;color:#c9d1d9;font-family:'Segoe UI',system-ui,sans-serif;padding:12px;max-width:100%;overflow-x:hidden}
h1{text-align:center;margin-bottom:4px;color:#58a6ff;font-size:1.5rem}
.sub{text-align:center;color:#8b949e;margin-bottom:20px;font-size:.8rem}
.ctrl{display:flex;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.ctrl button{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:.15s}
.ctrl button:hover,.ctrl button.active{background:#388bfd;border-color:#388bfd;color:#fff}
.stats{display:flex;justify-content:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.s{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:8px 12px;text-align:center;flex:1 1 auto;min-width:70px;max-width:120px}
.s .l{font-size:.65rem;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.s .v{font-size:1.2rem;font-weight:700;margin:2px 0}
.s .u{font-size:.65rem;color:#8b949e}
.ch{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:12px;margin-bottom:12px;overflow:hidden;position:relative;width:100%}
.ch h3{color:#58a6ff;font-size:.85rem;margin-bottom:8px}
.cg{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:768px){.cg{grid-template-columns:repeat(2,1fr)}}
canvas{max-height:220px}
.foot{text-align:center;color:#484f58;font-size:.75rem;margin-top:20px}
</style>
</head>
<body>
<h1>Galley Temps</h1>
<p class="sub">System telemetry — fetching live from server</p>

<div class="ctrl" id="ctrlBtns">
    <button class="active" data-r="1h">1h</button>
    <button data-r="6h">6h</button>
    <button data-r="24h">24h</button>
    <button data-r="all">All</button>
</div>

<div class="stats" id="stats">
    <div class="s"><div class="l">CPU</div><div class="v" id="sCPU">--</div><div class="u">°C</div></div>
    <div class="s"><div class="l">GPU 0</div><div class="v" id="sG0">--</div><div class="u">°C</div></div>
    <div class="s"><div class="l">GPU 1</div><div class="v" id="sG1">--</div><div class="u">°C</div></div>
    <div class="s"><div class="l">RAM</div><div class="v" id="sMEM">--</div><div class="u">%</div></div>
    <div class="s"><div class="l">Disk</div><div class="v" id="sDISK">--</div><div class="u">%</div></div>
    <div class="s"><div class="l">Uptime</div><div class="v" id="sUP">--</div><div class="u">hrs</div></div>
</div>

<div class="cg">
    <div class="ch"><h3>Temperatures</h3><canvas id="tempChart"></canvas></div>
    <div class="ch"><h3>GPU Utilization</h3><canvas id="gpuChart"></canvas></div>
    <div class="ch"><h3>CPU Usage</h3><canvas id="cpuChart"></canvas></div>
    <div class="ch"><h3>Memory &amp; Disk</h3><canvas id="memDisc"></canvas></div>
</div>

<p class="foot">Data from <span id="lastPt">loading</span> • auto-refreshes every 60s •
<a href="https://galley-temps.gaspartech.com/api/metrics" style="color:#58a6ff">raw CSV</a>
</p>

<script>
/* ── Config ── */
const IS_GH_PAGES = window.location.hostname.includes('github.io');
const CSV_SRC = IS_GH_PAGES ? 'https://galley-temps.gaspartech.com/api/metrics' : '/api/metrics';
const OPTS = {
    responsive: true, maintainAspectRatio: true,
    animation: { duration: 400 },
    plugins: { legend: { labels: { color: '#8b949e', font:{size:11} } } },
    scales: {
        x: { ticks:{color:'#484f58',maxRotation:45,font:{size:10}}, grid:{color:'#21262d'} },
        y: { ticks:{color:'#484f58',font:{size:10}}, grid:{color:'#21262d'}, min:0 },
    },
};
const C = { cpu:'#f97316', gpu0:'#22d3ee', gpu1:'#a855f7', mem:'#34d399', disk:'#facc15' };

let raw = [];
let charts = {};
let range = '1h';

/* ── Parse CSV ── */
function parseCSV(text) {
    const rows = [];
    const lines = text.trim().split('\n');
    for (let i = 1; i < lines.length; i++) {
        const p = lines[i].split(',');
        if (p.length < 10) continue;
        rows.push({
            t: new Date(p[0] + 'Z'),
            cpu: +p[1], cpuT: +p[2],
            mem: +p[3], disk: +p[4], up: +p[5],
            g0u: +p[6], g0t: +p[7], g1u: +p[8], g1t: +p[9],
        });
    }
    return rows;
}

function filter(d, r) {
    const now = new Date();
    const cut = {'1h': 3600,'6h': 21600,'24h': 86400,'all': Infinity}[r] || 3600;
    const maxAge = 30 * 86400; // 30 days in seconds
    return d.filter(row => {
        const age = (now - row.t) / 1000;
        return age < cut && age < maxAge;
    });
}

/* ── Charts ── */
function render(d) {
    const labels = d.map(r => r.t.toLocaleTimeString());

    function ds(label, data, color, max=100) {
        return { label, data, borderColor: color, tension:.3, fill:false, pointRadius:0,
            yAxisID:'y', order:1 };
    }

    if (charts.temp) charts.temp.destroy();
    charts.temp = new Chart(document.getElementById('tempChart'), {
        type:'line', data:{ labels, datasets:[
            ds('CPU °C', d.map(r=>r.cpuT), C.cpu),
            ds('GPU0 °C', d.map(r=>r.g0t), C.gpu0),
            ds('GPU1 °C', d.map(r=>r.g1t), C.gpu1),
        ]}, options:{...OPTS, scales:{...OPTS.scales, y:{...OPTS.scales.y, max:110}}},
    });

    if (charts.gpu) charts.gpu.destroy();
    charts.gpu = new Chart(document.getElementById('gpuChart'), {
        type:'line', data:{ labels, datasets:[
            ds('GPU0 %', d.map(r=>r.g0u), C.gpu0),
            ds('GPU1 %', d.map(r=>r.g1u), C.gpu1),
        ]}, options:{...OPTS, scales:{...OPTS.scales, y:{...OPTS.scales.y, max:100}}},
    });

    if (charts.cpu) charts.cpu.destroy();
    charts.cpu = new Chart(document.getElementById('cpuChart'), {
        type:'line', data:{ labels, datasets:[
            ds('CPU %', d.map(r=>r.cpu), C.cpu),
        ]}, options:{...OPTS, scales:{...OPTS.scales, y:{...OPTS.scales.y, max:100}}},
    });

    if (charts.memd) charts.memd.destroy();
    charts.memd = new Chart(document.getElementById('memDisc'), {
        type:'line', data:{ labels, datasets:[
            ds('RAM %', d.map(r=>r.mem), C.mem),
            ds('Disk %', d.map(r=>r.disk), C.disk),
        ]}, options:{...OPTS, scales:{...OPTS.scales, y:{...OPTS.scales.y, max:100}}},
    });

    if (d.length) {
        const last = d[d.length-1];
        document.getElementById('sCPU').textContent = last.cpuT.toFixed(1);
        document.getElementById('sG0').textContent = last.g0t.toFixed(1);
        document.getElementById('sG1').textContent = last.g1t.toFixed(1);
        document.getElementById('sMEM').textContent = last.mem.toFixed(0);
        document.getElementById('sDISK').textContent = last.disk.toFixed(0);
        document.getElementById('sUP').textContent = last.up.toFixed(1);
        document.getElementById('lastPt').textContent = last.t.toLocaleString();
    }
}

/* ── Fetch ── */
async function load() {
    try {
        const r = await fetch(CSV_SRC + '?t=' + Date.now());
        raw = parseCSV(await r.text());
        render(filter(raw, range));
    } catch(e) { console.error(e); }
}

/* ── Buttons ── */
document.getElementById('ctrlBtns').onclick = (e) => {
    if (e.target.tagName !== 'BUTTON') return;
    document.querySelectorAll('#ctrlBtns button').forEach(b=>b.classList.remove('active'));
    e.target.classList.add('active');
    range = e.target.dataset.r;
    render(filter(raw, range));
};

/* ── Boot ── */
load();
setInterval(load, 60000);
</script>
</body>
</html>
